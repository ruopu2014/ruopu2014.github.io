<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@font-face{
    font-family:'Lato';font-style:normal;font-weight:300;font-display:swap;
    src:url('S6u9w4BMUTPHh50XSwiPGQ3q5d0.woff2') format('woff2');
}
@font-face{
    font-family:'Lato';font-style:normal;font-weight:400;font-display:swap;
    src:url('S6uyw4BMUTPHjx4wXiWtFCc.woff2') format('woff2');
}
@font-face{
    font-family:'Lato';font-style:normal;font-weight:700;font-display:swap;
    src:url('S6u9w4BMUTPHh6UVSwiPGQ3q5d0.woff2') format('woff2');
}

:root{
    --bg:#eef3ff;
    --card:rgba(255,255,255,.60);
    --border:rgba(255,255,255,.85);
    --text:#36304a;
    --muted:#7d8499;
    --c-years:#ff4d6d;
    --c-months:#ff9f1c;
    --c-days:#3a86ff;
}

*{box-sizing:border-box;margin:0;padding:0;}

html{scroll-behavior:smooth;}

body{
    font-family:'Lato',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Calibri,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.7;
    overflow-x:hidden;
    min-height:100vh;
}

/* animated aurora background */
body::before{
    content:'';
    position:fixed;
    inset:-30%;
    z-index:-2;
    background:
        radial-gradient(42% 42% at 18% 18%, rgba(255,77,109,.40), transparent 62%),
        radial-gradient(46% 46% at 82% 14%, rgba(58,134,255,.38), transparent 62%),
        radial-gradient(52% 52% at 48% 92%, rgba(46,196,182,.38), transparent 62%),
        radial-gradient(44% 44% at 92% 82%, rgba(255,159,28,.40), transparent 62%),
        radial-gradient(40% 40% at 8% 75%, rgba(131,56,236,.32), transparent 62%);
    filter:blur(28px) saturate(1.15);
    animation:drift 22s ease-in-out infinite alternate;
}
@keyframes drift{
    0%{transform:translate(0,0) rotate(0deg) scale(1);}
    100%{transform:translate(-4%,3%) rotate(8deg) scale(1.1);}
}
body::after{
    content:'';
    position:fixed;
    inset:0;
    z-index:-1;
    background:radial-gradient(120% 120% at 50% 0%, rgba(255,255,255,.35) 0%, transparent 45%);
    pointer-events:none;
}

/* bulingbuling twinkling sparkles */
#sparkles{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    overflow:hidden;
}
.spark{
    position:absolute;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 6px 1px rgba(255,255,255,.9), 0 0 12px 2px var(--glow,#7db9ff);
    animation:twinkle var(--dur,3s) ease-in-out infinite;
    opacity:0;
}
@keyframes twinkle{
    0%,100%{opacity:0;transform:scale(.4);}
    50%{opacity:1;transform:scale(1.15);}
}

/* floating game emojis & characters */
#floaties,#gamers{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    overflow:hidden;
}
.floaty{
    position:absolute;
    bottom:-60px;
    font-size:30px;
    opacity:.55;
    animation:rise var(--dur,16s) linear infinite;
    animation-delay:var(--delay,0s);
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.12));
}
@keyframes rise{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    10%{opacity:.6;}
    90%{opacity:.6;}
    100%{transform:translateY(-115vh) rotate(360deg);opacity:0;}
}

/* game characters (CSS 手绘，非游戏官方素材) */
.gamer{
    position:absolute;
    bottom:-80px;
    opacity:.7;
    animation:floatChar var(--dur,20s) linear infinite;
    animation-delay:var(--delay,0s);
    filter:drop-shadow(0 6px 8px rgba(60,80,140,.18));
}
@keyframes floatChar{
    0%{transform:translateY(0) rotate(-8deg);opacity:0;}
    10%{opacity:.72;}
    50%{transform:translateY(-55vh) rotate(8deg);}
    90%{opacity:.72;}
    100%{transform:translateY(-118vh) rotate(-8deg);opacity:0;}
}

/* —— 太空小宇航员（豆豆人风格） —— */
.crew{position:relative;width:40px;height:52px;}
.crew i{position:absolute;}
.crew .torso{
    top:0;left:3px;right:3px;height:42px;
    background:var(--col);
    border-radius:18px 18px 9px 9px;
    box-shadow:inset -7px -4px 0 rgba(0,0,0,.14);
}
.crew .leg{bottom:0;width:13px;height:13px;background:var(--col);box-shadow:inset -4px 0 0 rgba(0,0,0,.14);}
.crew .leg.l{left:4px;border-radius:0 0 4px 7px;}
.crew .leg.r{right:4px;border-radius:0 0 7px 4px;}
.crew .pack{top:13px;left:-4px;width:11px;height:22px;background:var(--col);border-radius:7px;filter:brightness(.82);}
.crew .visor{
    top:10px;right:3px;width:23px;height:14px;
    background:linear-gradient(135deg,#cfefff,#7fd0ff 60%,#bfe9ff);
    border-radius:9px;
    box-shadow:inset 0 0 0 3px rgba(0,0,0,.10), inset 5px 3px 4px rgba(255,255,255,.7);
}

/* —— 蛋仔角色（圆滚滚 Q 弹风格） —— */
.egg{position:relative;width:42px;height:48px;}
.egg i{position:absolute;}
.egg .shell{
    inset:0;
    background:radial-gradient(120% 120% at 30% 22%, #fff 0%, var(--col) 55%, color-mix(in srgb,var(--col) 70%, #000) 130%);
    border-radius:50% 50% 50% 50% / 58% 58% 44% 44%;
    box-shadow:inset -5px -6px 0 rgba(0,0,0,.07);
}
.egg .eye{top:42%;width:5px;height:8px;background:#3a2f4a;border-radius:50%;}
.egg .eye.l{left:31%;}
.egg .eye.r{right:31%;}
.egg .mouth{top:60%;left:50%;transform:translateX(-50%);width:11px;height:6px;border:2px solid #3a2f4a;border-top:0;border-radius:0 0 11px 11px;}
.egg .blush{top:52%;width:6px;height:4px;background:rgba(255,90,120,.45);border-radius:50%;}
.egg .blush.l{left:20%;}
.egg .blush.r{right:20%;}
.egg .foot{bottom:-3px;width:9px;height:6px;background:var(--col);border-radius:0 0 6px 6px;filter:brightness(.9);}
.egg .foot.l{left:8px;}
.egg .foot.r{right:8px;}

/* click burst particles */
.burst{
    position:fixed;
    width:10px;height:10px;
    border-radius:50%;
    pointer-events:none;
    z-index:9999;
    animation:burst .7s ease-out forwards;
}
@keyframes burst{
    0%{transform:translate(0,0) scale(1);opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}
@media (prefers-reduced-motion:reduce){
    .spark,.floaty,body::before{animation:none;}
}

.container{
    max-width:920px;
    margin:0 auto;
    padding:0 20px;
}

/* hero */
.hero{
    text-align:center;
    padding:90px 0 40px;
}
.hero .eyebrow{
    text-transform:uppercase;
    letter-spacing:.4em;
    font-size:13px;
    font-weight:700;
    color:var(--muted);
    margin-bottom:18px;
}
h1.heading{
    font-size:clamp(38px,8vw,76px);
    font-weight:700;
    line-height:1.05;
    background:linear-gradient(120deg,#ff5e7e,#ffb547 35%,#39d98a 65%,#4cc2ff);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    background-size:200% auto;
    animation:shine 6s linear infinite;
}
@keyframes shine{to{background-position:200% center;}}

/* counter */
.counter-wrap{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    max-width:560px;
    margin:54px auto 30px;
}
.counter-item{
    position:relative;
    border-radius:26px;
    padding:24px 10px 20px;
    text-align:center;
    overflow:hidden;
    color:#fff;
    background:
        radial-gradient(120% 90% at 28% 12%, rgba(255,255,255,.55), transparent 50%),
        linear-gradient(160deg, var(--accent) 0%, var(--accent2) 100%);
    box-shadow:
        0 14px 26px -8px var(--accent),
        inset 0 -8px 14px rgba(0,0,0,.14),
        inset 0 4px 10px rgba(255,255,255,.45);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.counter-item:hover{transform:translateY(-8px) scale(1.04) rotate(-1.5deg);}
/* 顶部高光小气泡 */
.counter-item .ribbon{
    position:absolute;
    top:14px;right:16px;
    width:14px;height:14px;
    border-radius:50%;
    background:rgba(255,255,255,.6);
    box-shadow:14px 6px 0 -4px rgba(255,255,255,.4);
}
.counter-item .ico{
    font-size:34px;
    line-height:1;
    display:inline-block;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.18));
    animation:bob 3s ease-in-out infinite;
}
.counter-item:nth-child(2) .ico{animation-delay:.5s;}
.counter-item:nth-child(3) .ico{animation-delay:1s;}
.counter-item .num{
    margin-top:6px;
    font-size:clamp(40px,9vw,62px);
    font-weight:900;
    line-height:1;
    font-variant-numeric:tabular-nums;
    text-shadow:0 3px 0 rgba(0,0,0,.12), 0 0 18px rgba(255,255,255,.35);
}
.counter-item .lbl{
    margin-top:6px;
    font-size:15px;
    font-weight:700;
    letter-spacing:.08em;
    color:rgba(255,255,255,.92);
}
.c-years {--accent:#ff6b8b;--accent2:#ff3d6e;}
.c-months{--accent:#ffc24b;--accent2:#ff9f1c;}
.c-days  {--accent:#5aa9ff;--accent2:#3a86ff;}

/* achievements */
.section-title{
    text-align:center;
    font-size:14px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:700;
    margin:60px 0 22px;
}
.badges{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:14px;
}
.badge-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 10px;
    text-align:center;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    cursor:default;
    transition:transform .25s ease, box-shadow .25s ease;
}
.badge-card:hover{
    transform:translateY(-6px) rotate(-2deg);
    box-shadow:0 12px 28px rgba(120,140,200,.28);
}
.badge-card .ico{
    font-size:38px;
    line-height:1;
    display:inline-block;
    animation:bob 3s ease-in-out infinite;
}
.badge-card:nth-child(2n) .ico{animation-delay:.6s;}
.badge-card:nth-child(3n) .ico{animation-delay:1.2s;}
@keyframes bob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-7px);}
}
.badge-card .bt{
    margin-top:10px;
    font-weight:700;
    font-size:14px;
    color:var(--text);
}
.badge-card .bd{
    font-size:11.5px;
    color:var(--muted);
    margin-top:3px;
}

/* timeline */
.timeline{
    position:relative;
    margin:70px 0 30px;
    padding-left:34px;
}
.timeline::before{
    content:'';
    position:absolute;
    left:9px;top:6px;bottom:6px;
    width:2px;
    background:linear-gradient(to bottom,#ff5e7e,#ffb547,#39d98a,#4cc2ff);
    opacity:.5;
}
.entry{
    position:relative;
    margin-bottom:38px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px 26px;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    transition:transform .3s ease, border-color .3s ease;
}
.entry:hover{transform:translateX(4px);border-color:rgba(255,255,255,.2);}
.entry::before{
    content:'';
    position:absolute;
    left:-33px;top:28px;
    width:16px;height:16px;
    border-radius:50%;
    background:var(--bg);
    border:3px solid var(--dot,#4cc2ff);
    box-shadow:0 0 14px var(--dot,#4cc2ff);
}
.entry h2{
    font-size:24px;
    font-weight:700;
    margin-bottom:6px;
    color:#2a2138;
}
.entry time{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:12px;
    font-variant-numeric:tabular-nums;
}
.entry p{
    color:#564a68;
    font-size:15.5px;
}
.tags{
    margin-top:16px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.tag{
    font-size:12px;
    padding:4px 12px;
    border-radius:999px;
    background:rgba(58,134,255,.12);
    border:1px solid rgba(58,134,255,.28);
    color:#3a6fc4;
    font-weight:700;
}

/* wish + footer */
.wish{
    text-align:center;
    font-size:clamp(18px,3.5vw,26px);
    font-weight:300;
    color:#2a2138;
    margin:70px auto 50px;
    max-width:640px;
    line-height:1.5;
}
footer{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:30px 0 60px;
}

@media (max-width:680px){
    .hero{padding:64px 0 30px;}
}

/* =======================================================
   生日主题（生日当天自动开启 / URL 加 ?birthday 预览）
======================================================= */
#confetti{
    position:fixed;
    inset:0;
    z-index:50;
    pointer-events:none;
    overflow:hidden;
    display:none;
}
body.birthday #confetti{display:block;}
.confetti-pc{
    position:absolute;
    top:-24px;
    width:10px;height:16px;
    opacity:.95;
    animation:confFall var(--dur,5s) linear infinite;
    animation-delay:var(--delay,0s);
}
@keyframes confFall{
    0%{transform:translateY(-10vh) rotateZ(0deg) rotateY(0deg);}
    100%{transform:translateY(110vh) rotateZ(720deg) rotateY(360deg);}
}

.bday-banner{
    display:none;
    position:relative;
    margin:0 auto 6px;
    padding:22px 24px 26px;
    max-width:680px;
    text-align:center;
    border-radius:28px;
    background:
        radial-gradient(120% 120% at 50% 0%, rgba(255,255,255,.6), transparent 60%),
        linear-gradient(135deg,#ff9a3c,#ff5e7e 45%,#a855f7 100%);
    box-shadow:0 18px 40px -12px rgba(255,94,126,.7), inset 0 3px 12px rgba(255,255,255,.5);
    overflow:hidden;
}
body.birthday .bday-banner{display:block;animation:pop .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.bday-banner .cake{
    font-size:64px;
    line-height:1;
    display:inline-block;
    animation:bob 2.2s ease-in-out infinite;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.2));
}
.bday-banner .glow{
    position:absolute;
    top:-40%;left:50%;
    width:120px;height:160px;
    transform:translateX(-50%);
    background:radial-gradient(closest-side, rgba(255,235,150,.9), transparent 70%);
    animation:flicker 1.4s ease-in-out infinite;
    pointer-events:none;
}
@keyframes flicker{0%,100%{opacity:.7;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.12);}}
.bday-banner .big{
    margin:6px 0 4px;
    font-size:clamp(30px,7vw,52px);
    font-weight:900;
    color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.18), 0 0 22px rgba(255,255,255,.5);
    letter-spacing:.04em;
}
.bday-banner .sub{
    font-size:clamp(16px,3.6vw,22px);
    font-weight:700;
    color:#fff;
}
.bday-banner .sub b{
    font-size:1.5em;
    color:#fff8c5;
    text-shadow:0 0 14px rgba(255,240,150,.9);
}
.bday-banner .balloons{
    position:absolute;bottom:-6px;
    font-size:30px;opacity:.85;
}
.bday-banner .balloons.l{left:14px;animation:bob 2.6s ease-in-out infinite;}
.bday-banner .balloons.r{right:14px;animation:bob 2.6s ease-in-out infinite .8s;}

/* 生日当天页面整体更暖 */
body.birthday{--bg:#fff3e6;}
</style>
</head>

<div id="floaties"></div>
<div id="gamers"></div>
<div id="confetti"></div>

        tags: ["钢琴", "小星星"]

function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
}

(function renderTimeline(){

            tags += '<span class="tag">' + escapeHtml(e.tags[j]) + '</span>';
        }
        html +=
            '<article class="entry" style="--dot:' + e.dot + '">' +
                '<h2>' + escapeHtml(e.title) + '</h2>' +
                '<time>' + escapeHtml(e.time) + '</time>' +
                '<p>' + escapeHtml(e.text) + '</p>' +
                '<div class="tags">' + tags + '</div>' +
            '</article>';
    }
    document.getElementById('timeline').innerHTML = html;
})();


/* ===== 计时器（逻辑不变，getYear -> getFullYear，差值一致；改为实时跳动） ===== */
var birthDay = new Date(2014, 6, 16, 11, 50, 0); // 2014-07-16 11:50:00

function getDaysOfYears(time){
    return time.getFullYear() % 4 == 0 ? 366 : 365;
}

function getDaysOfMonth(time){
    switch (time.getMonth() + 1){
        case 1:  return 31;
        case 2:  return getDaysOfYears(time) == 366 ? 29 : 28;
        case 3:  return 31;
        case 4:  return 30;
        case 5:  return 31;
        case 6:  return 30;
        case 7:  return 31;
        case 8:  return 31;
        case 9:  return 30;
        case 10: return 31;
        case 11: return 30;
        case 12: return 31;
    }
}

function update(){
    var now = new Date();

    var dayNum = Math.floor((now.getTime() - birthDay.getTime()) / 1000 / 60 / 60 / 24);

    var dayInt = now.getDate() - birthDay.getDate();
    var montInt = now.getMonth() - birthDay.getMonth();
    montInt = dayInt < 0 ? (montInt - 1) : montInt;
    var yearInt = now.getFullYear() - birthDay.getFullYear();
    yearInt = montInt < 0 ? (yearInt - 1) : yearInt;

    montInt = montInt < 0 ? (12 + montInt) : montInt;
    dayInt  = dayInt  < 0 ? (getDaysOfMonth(birthDay) + dayInt) : dayInt;

    document.getElementById('ttd').textContent = "ruopu.wang has been " + dayNum + " days";
    document.getElementById('n-years').textContent  = yearInt;
    document.getElementById('n-months').textContent = montInt;
    document.getElementById('n-days').textContent   = dayInt;
    return yearInt;
}

var ageNow = update();

/* ===== 游戏角色（太空狼人杀宇航员 + 蛋仔派对风格，纯 CSS 手绘） ===== */
(function makeGamers(){
    var box = document.getElementById('gamers');
    var crewColors = ['#ff4d4d','#3a86ff','#2ec4b6','#ffd166','#8338ec','#ff8fab'];
    var eggColors  = ['#ffd166','#ff8fab','#90e0ef','#b8f2a0','#c8a8ff'];
    function crew(col){
        return '<span class="crew" style="--col:' + col + '">' +
            '<i class="pack"></i><i class="torso"></i>' +
            '<i class="leg l"></i><i class="leg r"></i><i class="visor"></i></span>';
    }
    function egg(col){
        return '<span class="egg" style="--col:' + col + '">' +
            '<i class="shell"></i><i class="eye l"></i><i class="eye r"></i>' +
            '<i class="blush l"></i><i class="blush r"></i><i class="mouth"></i>' +
            '<i class="foot l"></i><i class="foot r"></i></span>';
    }
    var n = window.innerWidth < 680 ? 5 : 9;
    var html = "";
    for (var i = 0; i < n; i++){
        var left = (i * 79 % 90) + 3;
        var dur  = 20 + (i * 37 % 16);                          // 20~36s
        var delay= (i * 33 % 28);                               // 0~28s
        var scale= (0.8 + (i * 19 % 8) / 10).toFixed(2);        // 0.8~1.5
        var inner = (i % 2 === 0)
            ? crew(crewColors[i % crewColors.length])
            : egg(eggColors[i % eggColors.length]);
        html += '<div class="gamer" style="left:' + left + '%;--dur:' + dur + 's;' +
                '--delay:' + delay + 's;transform:scale(' + scale + ')">' + inner + '</div>';
    }
    box.innerHTML = html;
})();


/* ===== 点击迸发星星特效 ===== */
document.addEventListener('click', function(e){
    var colors = ['#ff4d6d','#ff9f1c','#2ec4b6','#3a86ff','#8338ec','#06d6a0'];
    for (var i = 0; i < 10; i++){
        var p = document.createElement('span');
        p.className = 'burst';
        var ang = Math.PI * 2 * i / 10;
        var dist = 40 + (i * 23 % 40);
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        p.style.background = colors[i % colors.length];
        p.style.setProperty('--tx', Math.cos(ang) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(ang) * dist + 'px');
        document.body.appendChild(p);
        (function(el){ setTimeout(function(){ el.remove(); }, 700); })(p);
    }
});
